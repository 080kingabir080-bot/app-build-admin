<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL AI | Premium Intelligence Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #f8f9fa;
            --sidebar-bg: #ffffff;
            --accent-red: #ff3b3b;
            --accent-soft: #ffebeb;
            --text-dark: #0a0a0a;
            --text-gray: #5f6368;
            --border: #e8eaed;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow-sm: 0 2px 6px rgba(0,0,0,0.03);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.06);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Assistant', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-dark); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        nav { height: 70px; background: var(--glass); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 40px; z-index: 1000; }
        .brand { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .brand span { color: var(--accent-red); }
        .nav-actions { display: flex; gap: 15px; }
        .nav-btn { background: transparent; border: 1px solid var(--border); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 14px; }
        .nav-btn:hover { background: var(--accent-soft); color: var(--accent-red); border-color: var(--accent-red); }
        .nav-btn.active { background: var(--text-dark); color: white; }

        main { flex: 1; position: relative; overflow: hidden; }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; padding: 40px; overflow-y: auto; }
        .page.active { display: flex; flex-direction: column; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

        #home-page { justify-content: center; align-items: center; text-align: center; }
        .hero-box h1 { font-size: 5rem; font-weight: 800; margin-bottom: 20px; background: linear-gradient(135deg, #0a0a0a 0%, #ff3b3b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-box p { font-size: 1.4rem; color: var(--text-gray); max-width: 600px; margin-bottom: 40px; line-height: 1.6; }

        .cta-btn { background: var(--accent-red); color: white; border: none; padding: 20px 50px; border-radius: 50px; font-size: 1.2rem; font-weight: 700; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 59, 59, 0.2); transition: 0.3s; }
        .cta-btn:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(255, 59, 59, 0.3); }

        #chat-page { padding: 20px 0; max-width: 1000px; margin: 0 auto; height: 100%; }
        #chat-container { flex: 1; display: flex; flex-direction: column; background: white; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-lg); overflow: hidden; }
        #chat-window { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background-image: radial-gradient(var(--border) 1px, transparent 0); background-size: 40px 40px; }
        
        .message { max-width: 80%; padding: 16px 20px; border-radius: 18px; font-size: 1rem; line-height: 1.6; position: relative; animation: slideUp 0.3s ease; }
        .message.user { align-self: flex-start; background: var(--accent-soft); color: var(--text-dark); border-bottom-right-radius: 4px; border: 1px solid rgba(255, 59, 59, 0.1); }
        .message.ai { align-self: flex-end; background: #ffffff; color: var(--text-dark); border-bottom-left-radius: 4px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .typing-indicator { padding: 10px 20px; font-style: italic; color: var(--text-gray); font-size: 0.9rem; display: none; }
        
        .input-wrapper { padding: 25px; background: white; border-top: 1px solid var(--border); display: flex; gap: 15px; align-items: center; }
        .input-wrapper input { flex: 1; height: 55px; border-radius: 12px; border: 1px solid var(--border); padding: 0 20px; font-size: 1rem; outline: none; transition: 0.2s; background: var(--bg-main); }
        .input-wrapper input:focus { border-color: var(--accent-red); background: white; box-shadow: 0 0 0 4px var(--accent-soft); }
        .send-btn { width: 55px; height: 55px; border-radius: 12px; background: var(--accent-red); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }

        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .admin-card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 30px; box-shadow: var(--shadow-sm); }
        .admin-card h2 { margin-bottom: 20px; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .admin-card h2::before { content: ''; width: 4px; height: 20px; background: var(--accent-red); border-radius: 2px; }

        .login-overlay { position: absolute; inset: 0; background: var(--bg-main); z-index: 2000; display: flex; justify-content: center; align-items: center; transition: 0.5s; }
        .login-box { background: white; padding: 40px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-lg); width: 400px; text-align: center; }
        
        .stat-item { margin-bottom: 25px; }
        .stat-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 600; }
        .progress-bar { height: 8px; background: var(--border); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent-red); width: 0%; transition: width 1s ease; }
        
        textarea { width: 100%; height: 120px; border: 1px solid var(--border); border-radius: 8px; padding: 15px; resize: none; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>

    <nav>
        <div class="brand">SIGNAL<span>.AI</span></div>
        <div class="nav-actions">
            <button class="nav-btn active" onclick="nav('home-page', this)">בית</button>
            <button class="nav-btn" onclick="nav('chat-page', this)">צאט</button>
            <button class="nav-btn" onclick="nav('admin-page', this)">ניהול סוכן</button>
        </div>
    </nav>

    <main>
        <section id="home-page" class="page active">
            <div class="hero-box">
                <h1>Intelligence<br><span>Redefined.</span></h1>
                <p>חווה את הכוח של SIGNAL. סוכן בינה מלאכותית פרימיום לעסק שלך.</p>
                <button class="cta-btn" onclick="nav('chat-page')">התחילו עכשיו</button>
            </div>
        </section>

        <section id="chat-page" class="page">
            <div id="chat-container">
                <div id="chat-window">
                    <div class="message ai">ברוך הבא ל-SIGNAL. המערכת מוכנה. הזן מפתח API בדף הניהול כדי להתחיל.</div>
                </div>
                <div class="typing-indicator" id="typing">SIGNAL חושב...</div>
                <div class="input-wrapper">
                    <input type="text" id="chat-input" placeholder="שאל אותי משהו..." onkeypress="if(event.key === 'Enter') handleMessage()">
                    <button class="send-btn" onclick="handleMessage()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </section>

        <section id="admin-page" class="page">
            <div id="admin-auth" class="login-overlay">
                <div class="login-box">
                    <h2>גישת מנהל</h2>
                    <p>הזן סיסמה לשליטה בליבה</p>
                    <input type="password" id="admin-key" placeholder="סיסמה (1234)" style="width:100%; padding:12px; margin:20px 0; border:1px solid var(--border); border-radius:8px;">
                    <button class="cta-btn" style="width: 100%; padding: 15px;" onclick="unlockAdmin()">כניסה למערכת</button>
                </div>
            </div>

            <div class="admin-grid">
                <div class="admin-card">
                    <h2>הגדרות חיבור (API)</h2>
                    <p style="font-size: 14px; margin-bottom: 10px;">סטטוס: <span id="connection-status" style="color: red; font-weight: bold;">לא מחובר</span></p>
                    <input type="text" id="api-storage-input" placeholder="הדבק כאן מפתח AIza..." style="width:100%; padding:15px; margin-bottom:15px; border:1px solid var(--border); border-radius:8px;">
                    <button class="cta-btn" style="width:100%; background:#28a745; padding: 15px;" onclick="quickConnect()">חבר מנוע בינה מלאכותית</button>
                    
                    <div style="margin-top: 30px;">
                        <div class="stat-item">
                            <div class="stat-header"><span>דיוק (Accuracy)</span><span id="acc-label">92.4%</span></div>
                            <div class="progress-bar"><div id="acc-bar" class="progress-fill" style="width: 92.4%"></div></div>
                        </div>
                    </div>
                </div>

                <div class="admin-card">
                    <h2>הגדרות אישיות</h2>
                    <textarea id="sys-prompt" placeholder="איך הסוכן יתנהג? (למשל: תענה תמיד בעברית מקצועית)"></textarea>
                    <button class="cta-btn" style="width: 100%; padding: 15px;" onclick="saveSystemCore()">שמור הגדרות סוכן</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // שליפת מפתח וניקוי רווחים
        const getApiKey = () => (localStorage.getItem('user_api_key') || "").trim();
        
        let state = {
            interactions: parseInt(localStorage.getItem('sig_int')) || 0,
            systemPrompt: localStorage.getItem('sig_sys') || "You are SIGNAL AI, a premium assistant. Respond in Hebrew.",
            isTyping: false
        };

        function nav(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(btn) btn.classList.add('active');
        }

        function unlockAdmin() {
            if(document.getElementById('admin-key').value === "1234") {
                document.getElementById('admin-auth').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('admin-auth').style.display = 'none';
                    document.getElementById('sys-prompt').value = state.systemPrompt;
                    checkStatus();
                }, 500);
            } else { alert("סיסמה שגויה"); }
        }

        function quickConnect() {
            const key = document.getElementById('api-storage-input').value.trim();
            if (key.startsWith("AIza")) {
                localStorage.setItem('user_api_key', key);
                alert("המפתח נשמר! האתר יתרענן.");
                location.reload();
            } else { alert("מפתח לא תקין - וודא שהוא מתחיל ב-AIza"); }
        }

        function saveSystemCore() {
            const val = document.getElementById('sys-prompt').value;
            localStorage.setItem('sig_sys', val);
            state.systemPrompt = val;
            alert("הגדרות האישיות נשמרו.");
        }

        function checkStatus() {
            const statusLabel = document.getElementById('connection-status');
            if(getApiKey()) {
                statusLabel.innerText = "מחובר (Active)";
                statusLabel.style.color = "green";
            }
            document.getElementById('int-label')?.innerText || ""; 
            const acc = Math.min(99.9, 92.4 + (state.interactions * 0.1)).toFixed(1);
            if(document.getElementById('acc-label')) {
                document.getElementById('acc-label').innerText = acc + "%";
                document.getElementById('acc-bar').style.width = acc + "%";
            }
        }

        async function handleMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    const apiKey = getApiKey();

    if(!apiKey) { 
        alert("יש להזין מפתח API בדף הניהול"); 
        return; 
    }
    if(!msg || state.isTyping) return;

    appendMessage('user', msg);
    input.value = '';
    state.isTyping = true;
    document.getElementById('typing').style.display = 'block';

    try {
        // שלב 1: זיהוי אוטומטי של המודל הזמין בחשבון שלך
        const listUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`;
        const listResp = await fetch(listUrl);
        const listData = await listResp.json();

        if (listData.error) {
            throw new Error("מפתח API לא תקין או שאין הרשאה. בדוק את הסטודיו.");
        }

        // מוצאים את המודל הראשון שתומך בצאט (generateContent)
        // בדרך כלל זה יהיה gemini-1.5-flash או gemini-pro
        const model = listData.models.find(m => m.supportedGenerationMethods.includes("generateContent"));

        if (!model) {
            throw new Error("לא נמצא מודל פעיל בחשבון ה-API שלך.");
        }

        console.log("SIGNAL מחובר למודל: " + model.name);

        // שלב 2: שליחת ההודעה למודל שנמצא
        const url = `https://generativelanguage.googleapis.com/v1beta/${model.name}:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: state.systemPrompt + "\n\nUser: " + msg }] }]
            })
        });

        const data = await response.json();

        if (data.error) {
            throw new Error(data.error.message);
        }

        if (data.candidates && data.candidates[0].content) {
            const aiText = data.candidates[0].content.parts[0].text;
            appendMessage('ai', aiText);
            
            state.interactions++;
            localStorage.setItem('sig_int', state.interactions);
            if (typeof checkStatus === "function") checkStatus();
        }

    } catch (err) {
        console.error("Signal Error:", err);
        appendMessage('ai', "שגיאה בחיבור: " + err.message);
    } finally {
        state.isTyping = false;
        document.getElementById('typing').style.display = 'none';
    }
}

function appendMessage(role, text) {
    const win = document.getElementById('chat-window');
    if (!win) return;
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerText = text;
    win.appendChild(div);
    win.scrollTop = win.scrollHeight;
}
window.onload = checkStatus;
    </script>
</body>
</html>
