<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sar-AI | Persistent Neural Engine</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Assistant', sans-serif; background: #020617; color: #f1f5f9; overflow: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(56, 189, 248, 0.15); }
        .skill-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(56, 189, 248, 0.2); transition: all 0.3s ease; }
        .skill-card:hover { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.1); }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col h-screen" onload="initBrain()">

    <!-- Header & Live Indicators -->
    <header class="p-4 flex justify-between items-center glass-panel z-10">
        <div class="flex items-center gap-4">
            <div class="relative w-12 h-12 bg-sky-500/10 rounded-2xl flex items-center justify-center border border-sky-500/30">
                <i class="fas fa-brain text-sky-400 text-xl"></i>
                <div class="absolute -top-1 -left-1 w-3 h-3 bg-green-500 rounded-full status-pulse"></div>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-white leading-none">Sar-AI <span class="text-sky-500 text-sm">V2.0</span></h1>
                <div id="experienceInfo" class="text-[10px] text-slate-400 font-mono mt-1 uppercase tracking-widest">Experience: 0 | Knowledge Base: 2</div>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="clearMemory()" class="p-3 rounded-xl hover:bg-red-500/10 text-slate-500 hover:text-red-400 transition-all" title="אפס זיכרון">
                <i class="fas fa-trash-alt"></i>
            </button>
            <button onclick="openAdmin()" class="bg-sky-500/10 hover:bg-sky-500/20 p-3 rounded-xl transition-all border border-sky-500/20">
                <i class="fas fa-key text-sky-400"></i>
            </button>
        </div>
    </header>

    <!-- Active Capabilities Tabs -->
    <nav id="moduleTabs" class="flex gap-2 p-3 bg-slate-900/80 overflow-x-auto no-scrollbar border-b border-white/5"></nav>

    <!-- Chat -->
    <main id="chatOutput" class="flex-1 overflow-y-auto p-6 space-y-6 bg-[radial-gradient(#1e293b_1px,transparent_1px)] [background-size:20px_20px]"></main>

    <!-- Input -->
    <footer class="p-4 glass-panel border-t border-sky-500/10">
        <div class="max-w-5xl mx-auto flex gap-3 relative">
            <input type="text" id="userInput" onkeypress="if(event.key==='Enter') executeAgent()" placeholder="שלח פקודה לניתוח..." 
                class="w-full bg-slate-950 border border-slate-800 rounded-2xl py-4 px-6 outline-none focus:border-sky-500/50 text-lg shadow-inner">
            <button onclick="executeAgent()" class="bg-sky-600 hover:bg-sky-500 px-6 rounded-2xl shadow-lg shadow-sky-900/40 transition-all">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </footer>

    <!-- Admin Panel (Secure Gate) -->
    <div id="adminPanel" class="fixed inset-0 bg-slate-950/98 backdrop-blur-3xl z-50 hidden flex items-center justify-center p-4">
        <div id="loginGate" class="w-full max-w-sm text-center">
            <i class="fas fa-shield-halved text-5xl text-sky-500 mb-6"></i>
            <h2 class="text-2xl font-bold mb-6">אימות מנהל מערכת</h2>
            <input type="password" id="admPass" placeholder="סיסמה" class="w-full bg-slate-900 p-4 rounded-xl mb-6 border border-white/10 outline-none focus:border-sky-500 text-center tracking-widest">
            <button onclick="verifyAccess()" class="w-full bg-sky-600 py-4 rounded-xl font-bold hover:bg-sky-500 transition-all">פתח ממשק ליבה</button>
            <button onclick="closeAdmin()" class="mt-4 text-slate-500 text-sm">ביטול וחזרה</button>
        </div>

        <div id="brainMgmt" class="hidden w-full max-w-5xl h-[85vh] flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold flex items-center gap-3">
                    <i class="fas fa-dna text-sky-400"></i> הנדסת מוח הסוכן
                </h2>
                <button onclick="closeAdmin()" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-4 py-2 rounded-lg transition-all">סגור פאנל</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 flex-1 overflow-hidden">
                <!-- Creator Form -->
                <div class="space-y-4 flex flex-col">
                    <div class="bg-sky-500/5 p-6 rounded-3xl border border-sky-500/20 flex-1 flex flex-col">
                        <h3 class="font-bold text-sky-400 mb-4 flex items-center gap-2"><i class="fas fa-plus-circle"></i> יצירת מנגנון חדש</h3>
                        <input type="text" id="newSkillName" placeholder="שם היכולת (למשל: מודל פסיכולוגי)" class="w-full bg-slate-900 p-4 rounded-xl mb-4 border border-white/10 outline-none focus:border-sky-500">
                        <textarea id="newSkillLogic" placeholder="הגדר את הלוגיקה, החוקים והטון של המנגנון הזה..." class="w-full bg-slate-900 p-4 rounded-xl flex-1 mb-4 text-sm font-mono outline-none focus:border-sky-500"></textarea>
                        <button onclick="addNewModule()" class="w-full bg-sky-500 text-white py-4 rounded-xl font-bold shadow-lg shadow-sky-500/20">הזרק לזיכרון הטווח-ארוך</button>
                    </div>
                </div>

                <!-- Active Modules List -->
                <div id="modulesList" class="space-y-4 overflow-y-auto pr-2 no-scrollbar"></div>
            </div>
        </div>
    </div>

    <script>
        // Brain Core Storage
        let agentBrain = {
            experience: 0,
            modules: [
                { name: "ליבה", logic: "ניתוח לוגי רב-שכבתי, עברית גבוהה, קבלת החלטות מהירה." },
                { name: "מודל רגשי", logic: "אמפתיה מחושבת, זיהוי טון המשתמש והתאמת קצב השיחה." }
            ]
        };

        // Initialize Brain from LocalStorage
        function initBrain() {
            const savedBrain = localStorage.getItem('SAR_AI_BRAIN');
            if (savedBrain) {
                agentBrain = JSON.parse(savedBrain);
            }
            refreshUI();
            addBotMessage("מערכת Sar-AI עלתה בהצלחה. כל מנגנוני הזיכרון טעונים.");
        }

        function saveBrain() {
            localStorage.setItem('SAR_AI_BRAIN', JSON.stringify(agentBrain));
        }

        function executeAgent() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;

            addUserMessage(val);
            input.value = '';

            // Update Experience (Training)
            agentBrain.experience += 1;
            saveBrain();
            document.getElementById('experienceInfo').innerText = `Experience: ${agentBrain.experience} | Knowledge Base: ${agentBrain.modules.length}`;

            // Simulating analysis through ALL modules
            const activeModule = agentBrain.modules[agentBrain.modules.length - 1].name;
            setTimeout(() => {
                addBotMessage(`[ניתוח רב-מנגנוני]: הבקשה עובדה דרך מודל ה"${activeModule}". המסקנה שלי מבוססת על ${agentBrain.experience} אינטראקציות קודמות.`, true);
            }, 1000);
        }

        function addUserMessage(text) {
            const chat = document.getElementById('chatOutput');
            chat.innerHTML += `<div class="flex justify-end mb-4"><div class="bg-sky-600 p-4 rounded-2xl rounded-tr-none max-w-[85%] shadow-lg shadow-sky-900/20">${text}</div></div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        function addBotMessage(text, showModule = false) {
            const chat = document.getElementById('chatOutput');
            const html = `
                <div class="flex justify-start mb-6 animate-in fade-in duration-500">
                    <div class="skill-card p-5 rounded-2xl rounded-tl-none max-w-[85%]">
                        ${showModule ? `<div class="text-[10px] text-sky-400 font-mono mb-2 uppercase border-b border-sky-500/20 pb-1">Neural Path: ${agentBrain.modules.map(m => m.name).join(' > ')}</div>` : ''}
                        <p class="leading-relaxed">${text}</p>
                    </div>
                </div>`;
            chat.innerHTML += html;
            chat.scrollTop = chat.scrollHeight;
        }

        // Admin Logic
        function openAdmin() { document.getElementById('adminPanel').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminPanel').classList.add('hidden'); }

        function verifyAccess() {
            if(document.getElementById('admPass').value === 'admin') {
                document.getElementById('loginGate').classList.add('hidden');
                document.getElementById('brainMgmt').classList.remove('hidden');
                refreshUI();
            } else { alert('Access Denied'); }
        }

        function addNewModule() {
            const name = document.getElementById('newSkillName').value;
            const logic = document.getElementById('newSkillLogic').value;
            if(!name || !logic) return;

            agentBrain.modules.push({ name, logic });
            saveBrain();
            
            document.getElementById('newSkillName').value = '';
            document.getElementById('newSkillLogic').value = '';
            
            refreshUI();
            alert(`מנגנון "${name}" הוטמע בזיכרון הטווח הארוך.`);
        }

        function removeModule(index) {
            if(confirm('למחוק מנגנון זה מהמוח?')) {
                agentBrain.modules.splice(index, 1);
                saveBrain();
                refreshUI();
            }
        }

        function clearMemory() {
            if(confirm('זה ימחק את כל הלמידה והיכולות שהוספת. להמשיך?')) {
                localStorage.removeItem('SAR_AI_BRAIN');
                location.reload();
            }
        }

        function refreshUI() {
            const list = document.getElementById('modulesList');
            const tabs = document.getElementById('moduleTabs');
            
            list.innerHTML = '';
            tabs.innerHTML = '';
            
            agentBrain.modules.forEach((m, i) => {
                list.innerHTML += `
                    <div class="skill-card p-5 rounded-2xl flex justify-between items-center group">
                        <div class="flex-1">
                            <div class="text-sky-400 font-bold mb-1">${m.name}</div>
                            <div class="text-xs text-slate-400 line-clamp-2 font-mono">${m.logic}</div>
                        </div>
                        <button onclick="removeModule(${i})" class="text-slate-600 hover:text-red-500 p-2"><i class="fas fa-times"></i></button>
                    </div>`;
                
                tabs.innerHTML += `<div class="px-4 py-1.5 rounded-full bg-sky-500/10 border border-sky-500/30 text-sky-400 text-[11px] font-bold whitespace-nowrap shadow-sm shadow-sky-500/5">${m.name}</div>`;
            });
            
            document.getElementById('experienceInfo').innerText = `Experience: ${agentBrain.experience} | Knowledge Base: ${agentBrain.modules.length}`;
        }
    </script>
</body>
</html>
