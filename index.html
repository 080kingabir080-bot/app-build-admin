<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Now | Enterprise Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #F8FAFC; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .signal-red { background-color: #FF3B30; }
        .signal-border { border-color: #FF3B30; }
        .signal-text { color: #FF3B30; }
        .sidebar-item:hover { background-color: #FFF5F5; color: #FF3B30; }
        .sidebar-item.active { background-color: #FF3B30; color: white; }
        @keyframes pulse-custom { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-custom { animation: pulse-custom 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="text-slate-900">

<div id="app">
    <div id="view-auth" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-100 p-6">
        <div class="glass-card w-full max-w-md rounded-[32px] p-10 shadow-2xl overflow-hidden relative">
            <div class="absolute top-0 left-0 w-full h-2 signal-red"></div>
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black tracking-tighter">App Now <span class="signal-text">Network</span></h1>
                <p class="text-slate-400 mt-2 font-medium">Enterprise Security Protocol v3.0</p>
            </div>
            
            <div id="auth-tabs" class="flex p-1 bg-slate-100 rounded-2xl mb-6">
                <button onclick="toggleAuth('login')" class="flex-1 py-3 rounded-xl font-bold transition-all" id="btn-tab-login">התחברות</button>
                <button onclick="toggleAuth('reg')" class="flex-1 py-3 rounded-xl font-bold transition-all bg-white shadow-sm" id="btn-tab-reg">הרשמה</button>
            </div>

            <div id="form-content">
                <div id="pane-reg" class="space-y-4">
                    <input type="text" id="re-name" placeholder="שם מלא" class="w-full p-4 rounded-2xl border border-slate-200 focus:signal-border focus:ring-2 focus:ring-red-100 outline-none transition-all">
                    <input type="password" id="re-pass" placeholder="סיסמת אבטחה" class="w-full p-4 rounded-2xl border border-slate-200 focus:signal-border focus:ring-2 focus:ring-red-100 outline-none transition-all">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="tel" id="re-phone" placeholder="טלפון" class="w-full p-4 rounded-2xl border border-slate-200 outline-none">
                        <input type="email" id="re-email" placeholder="אימייל" class="w-full p-4 rounded-2xl border border-slate-200 outline-none">
                    </div>
                    <button onclick="app.register()" class="w-full signal-red text-white py-4 rounded-2xl font-black text-lg hover:opacity-90 transition-all shadow-lg shadow-red-200">צור חשבון מאובטח</button>
                </div>
            </div>
        </div>
    </div>

    <div id="view-main" class="hidden flex h-screen overflow-hidden">
        <aside class="w-72 glass-card h-full flex flex-col p-6 z-20">
            <div class="mb-10 px-2">
                <h2 class="text-2xl font-black tracking-tight">App Now <span class="signal-text">.</span></h2>
                <div class="flex items-center gap-2 mt-1">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">System Online</span>
                </div>
            </div>

            <nav class="flex-1 space-y-2" id="main-nav">
                </nav>

            <div class="mt-auto border-t pt-6">
                <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-2xl">
                    <div class="w-10 h-10 rounded-full signal-red flex items-center justify-center text-white font-bold" id="user-avatar">?</div>
                    <div class="flex-1 overflow-hidden">
                        <p class="text-sm font-bold truncate" id="user-display-name">Guest User</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase" id="user-role-badge">Unauthorized</p>
                    </div>
                    <button onclick="location.reload()" class="p-2 hover:bg-slate-200 rounded-xl transition-all"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-10">
            <header class="flex justify-between items-end mb-10">
                <div>
                    <h3 class="text-slate-400 font-bold uppercase tracking-widest text-xs mb-1" id="section-subtitle">Overview</h3>
                    <h2 class="text-4xl font-black tracking-tight" id="section-title">Dashboard</h2>
                </div>
                <div class="flex gap-3">
                    <div class="glass-card px-6 py-3 rounded-2xl flex items-center gap-3 shadow-sm">
                        <i data-lucide="calendar" class="w-4 h-4 text-slate-400"></i>
                        <span class="text-sm font-bold" id="current-date">--/--/----</span>
                    </div>
                </div>
            </header>

            <div id="content-render">
                </div>
        </main>
    </div>
</div>

<script>
    // --- ENTERPRISE CORE ENGINE ---
    const app = {
        state: {
            user: null,
            activeView: 'dashboard',
            db: JSON.parse(localStorage.getItem('app_now_db')) || {
                users: [{ name: 'shimon', pass: 'shimonadmin0', role: 'admin', status: 'active' }],
                chats: {},
                settings: { trainingLock: true }
            }
        },

        init() {
            lucide.createIcons();
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('he-IL');
            this.sync();
        },

        sync() {
            localStorage.setItem('app_now_db', JSON.stringify(this.db));
        },

        // Auth Logic
        register() {
            const name = document.getElementById('re-name').value;
            const pass = document.getElementById('re-pass').value;
            if(!name || pass.length < 6) return alert("אבטחה: סיסמה חייבת להיות לפחות 6 תווים");

            const newUser = {
                name, pass, 
                role: 'rep', 
                status: 'pending',
                joined: new Date().toISOString(),
                id: 'id_' + Math.random().toString(36).substr(2, 9)
            };

            this.db.users.push(newUser);
            this.sync();
            alert("המשתמש נוצר במערכת. המנהל בודק את הרשאות הגישה שלך.");
            location.reload();
        },

        login() {
            const name = document.getElementById('li-user').value;
            const pass = document.getElementById('li-pass').value;
            const user = this.db.users.find(u => u.name === name && u.pass === pass);

            if(!user) return alert("גישה נדחתה: פרטי התחברות שגויים");

            this.state.user = user;
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('view-main').classList.remove('hidden');
            
            // Update Sidebar Profile
            document.getElementById('user-display-name').innerText = user.name;
            document.getElementById('user-role-badge').innerText = user.role;
            document.getElementById('user-avatar').innerText = user.name[0].toUpperCase();

            this.renderNav();
            this.navigate('dashboard');
        },

        // Navigation Engine
        renderNav() {
            const nav = document.getElementById('main-nav');
            const items = [
                { id: 'dashboard', icon: 'layout-grid', label: 'סקירה כללית' },
                { id: 'interview', icon: 'mic', label: 'מרכז ראיונות' },
                { id: 'training', icon: 'graduation-cap', label: 'הכשרה מקצועית' }
            ];

            if(this.state.user.role === 'admin') {
                items.push({ id: 'admin-users', icon: 'users', label: 'ניהול נציגים' });
                items.push({ id: 'admin-stats', icon: 'bar-chart-3', label: 'אנליטיקה' });
            }

            nav.innerHTML = items.map(item => `
                <button onclick="app.navigate('${item.id}')" id="nav-${item.id}" class="sidebar-item w-full flex items-center gap-4 px-4 py-4 rounded-2xl font-bold transition-all text-slate-500">
                    <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                    <span>${item.label}</span>
                </button>
            `).join('');
            lucide.createIcons();
        },

        navigate(viewId) {
            this.state.activeView = viewId;
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${viewId}`).classList.add('active');
            
            this.renderView(viewId);
        },

        // Render Logic
        renderView(viewId) {
            const container = document.getElementById('content-render');
            const user = this.state.user;

            if(viewId === 'dashboard') {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="glass-card p-8 rounded-[28px] border-l-8 signal-border">
                            <p class="text-slate-400 font-bold text-xs uppercase mb-2">סטטוס משתמש</p>
                            <h4 class="text-3xl font-black">${user.status === 'active' ? 'מורשה' : 'בבדיקה'}</h4>
                        </div>
                        <div class="glass-card p-8 rounded-[28px]">
                            <p class="text-slate-400 font-bold text-xs uppercase mb-2">הודעות מערכת</p>
                            <h4 class="text-3xl font-black">0</h4>
                        </div>
                        <div class="glass-card p-8 rounded-[28px]">
                            <p class="text-slate-400 font-bold text-xs uppercase mb-2">דירוג איכות</p>
                            <h4 class="text-3xl font-black text-emerald-500">A+</h4>
                        </div>
                    </div>
                    <div class="mt-10 glass-card p-10 rounded-[32px]">
                        <h3 class="text-xl font-black mb-4">עדכונים אחרונים</h3>
                        <div class="space-y-4">
                            <div class="flex gap-4 p-4 bg-slate-50 rounded-2xl">
                                <div class="w-12 h-12 rounded-xl signal-red flex items-center justify-center text-white"><i data-lucide="shield-check"></i></div>
                                <div>
                                    <p class="font-bold">פרוטוקול אבטחה עודכן</p>
                                    <p class="text-sm text-slate-500">המערכת כעת פועלת תחת הצפנה מקצה לקצה.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            if(viewId === 'admin-users') {
                const candidates = this.db.users.filter(u => u.role !== 'admin');
                container.innerHTML = `
                    <div class="glass-card rounded-[32px] overflow-hidden">
                        <table class="w-full text-right">
                            <thead class="bg-slate-50 text-slate-400 text-xs font-black uppercase">
                                <tr>
                                    <th class="p-6">נציג</th>
                                    <th class="p-6">סטטוס</th>
                                    <th class="p-6">תאריך הצטרפות</th>
                                    <th class="p-6">פעולות</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y">
                                ${candidates.map(u => `
                                    <tr class="hover:bg-slate-50 transition-all">
                                        <td class="p-6 font-bold">${u.name}</td>
                                        <td class="p-6"><span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${u.status === 'pending' ? 'bg-amber-100 text-amber-600' : 'bg-emerald-100 text-emerald-600'}">${u.status}</span></td>
                                        <td class="p-6 text-sm text-slate-400">${new Date(u.joined).toLocaleDateString()}</td>
                                        <td class="p-6">
                                            <button onclick="app.approveUser('${u.id}')" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-black">נהל גישה</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }

            lucide.createIcons();
        },

        approveUser(id) {
            const user = this.db.users.find(u => u.id === id);
            if(confirm(`האם לאשר את הנציג ${user.name} לראיון?`)) {
                user.status = 'interview';
                this.sync();
                this.renderView('admin-users');
            }
        }
    };

    function toggleAuth(mode) {
        const pane = document.getElementById('form-content');
        const btnReg = document.getElementById('btn-tab-reg');
        const btnLogin = document.getElementById('btn-tab-login');

        if(mode === 'login') {
            pane.innerHTML = `
                <div class="space-y-4">
                    <input type="text" id="li-user" placeholder="שם משתמש" class="w-full p-4 rounded-2xl border border-slate-200 outline-none">
                    <input type="password" id="li-pass" placeholder="סיסמה" class="w-full p-4 rounded-2xl border border-slate-200 outline-none">
                    <button onclick="app.login()" class="w-full signal-red text-white py-4 rounded-2xl font-black text-lg shadow-lg">כניסה מאובטחת</button>
                </div>
            `;
            btnLogin.classList.add('bg-white', 'shadow-sm');
            btnReg.classList.remove('bg-white', 'shadow-sm');
        } else {
            location.reload();
        }
    }

    window.onload = () => app.init();
</script>
</body>
</html>
